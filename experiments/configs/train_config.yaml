experiment_name: "DIMI_multilabel_narrative_classification_train"
seed: 42
# Change to "BAAI/bge-m3" when handling very long data or change to "microsoft/deberta-v3-base" when handling multilangual data 
model_name: "DTAI-KULeuven/robbert-2022-dutch-base" 
num_labels: 6

data:
  dataset_type: "narrative_parquet"
  processed_dir: "data/processed"
  max_length: 512
  num_workers: 4

training:
  epochs: 5
  learning_rate: 0.00003
  batch_size: 16
  weight_decay: 0.1
  save_dir: "experiments/results"
  
