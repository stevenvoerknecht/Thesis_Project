experiment_name: "tcga_multimodal_model"
seed: 42
# you can have the modalities "multimodal", "text" or "image"
modality: "multimodal"

data:
  dataset_type: "tcga"
  data_path: "data/processed"
  batch_size: 16
  num_workers: 2

model:
  image_input_dim: 768
  text_input_dim: 1024
  fusion_hidden: 128
  hidden_units: [128, 64]
  num_classes: 33
  dropout_rate: 0.2

training:
  epochs: 5
  learning_rate: 0.0005
  save_dir: "experiments/results"

mlflow:
  experiment_name: tcga_run_1
  tracking_dir: "./experiments/mlflow_tracking"

optimizer: "adam"

scheduler:
  name: "reduce_lr_on_plateau"
  factor: 0.1
  patience: 2
  
